<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Мой Район</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #6495ed;
        color: #fff;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .card {
        padding: 32px 24px;
        max-width: 360px;
      }
      h1 { font-size: 22px; margin: 0 0 12px; }
      p { opacity: 0.9; line-height: 1.5; margin: 0 0 24px; }
      a.btn {
        display: inline-block;
        background: #fff;
        color: #6495ed;
        text-decoration: none;
        font-weight: 700;
        padding: 14px 22px;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Откройте в приложении «Мой Район»</h1>
      <p>Если приложение установлено — оно откроется автоматически. Иначе установите его.</p>
      <a class="btn" id="store" href="#">Скачать приложение</a>
    </div>

    <script>
      var APP_SCHEME = 'moyrayon';
      var IOS_URL = 'https://apps.apple.com/app/id6782414926';
      var ANDROID_URL =
        'https://play.google.com/store/apps/details?id=com.neighbours.app';

      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua);
      var isAndroid = /Android/.test(ua);

      // type и id протащены через query в .htaccess (RewriteRule listing/service),
      // т.к. при редиректе исходный путь /service/<id> теряется.
      var params = new URLSearchParams(location.search);
      var type = params.get('type');
      var id = params.get('id');

      // Кнопка «Скачать» — ручной фолбэк в нужный стор.
      document.getElementById('store').setAttribute('href', isIOS ? IOS_URL : ANDROID_URL);

      // На мобильном пробуем открыть приложение по кастомной схеме
      // (moyrayon://service/<id>). Если приложение установлено — оно откроется;
      // если нет, пользователь останется на этой странице с кнопкой установки.
      if ((isIOS || isAndroid) && type && id) {
        window.location.href = APP_SCHEME + '://' + type + '/' + id;
      }
    </script>
  </body>
</html>
