<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Мой Район</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #6495ed;
        color: #fff;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .card {
        padding: 32px 24px;
        max-width: 360px;
      }
      h1 { font-size: 22px; margin: 0 0 12px; }
      p { opacity: 0.9; line-height: 1.5; margin: 0 0 24px; }
      a.btn {
        display: inline-block;
        background: #fff;
        color: #6495ed;
        text-decoration: none;
        font-weight: 700;
        padding: 14px 22px;
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Откройте в приложении «Мой Район»</h1>
      <p>Чтобы посмотреть содержимое, установите приложение.</p>
      <a class="btn" id="store" href="#">Скачать приложение</a>
    </div>

    <script>
      // Магазины приложений. ВАЖНО: после публикации в App Store подставьте id приложения.
      var IOS_URL = 'https://apps.apple.com/app/id6782414926';
      var ANDROID_URL =
        'https://play.google.com/store/apps/details?id=com.neighbours.app';

      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua);
      var isAndroid = /Android/.test(ua);
      var url = isIOS ? IOS_URL : isAndroid ? ANDROID_URL : ANDROID_URL;

      document.getElementById('store').setAttribute('href', url);
      // На мобильных уводим в стор сразу.
      if (isIOS || isAndroid) {
        window.location.replace(url);
      }
    </script>
  </body>
</html>
